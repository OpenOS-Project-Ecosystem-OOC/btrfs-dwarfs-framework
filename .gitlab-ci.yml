# Converted from GitHub Actions — btrfs-dwarfs-framework
# C/kernel project — build and lint with make.

stages:
  - secret-scan
  - test
  - integration
  - build

default:
  image: ubuntu:22.04

lint:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y shellcheck
  script:
    - |
      failed=0
      for f in $(find . -name "*.sh" ! -path "./.git/*"); do
        # autosnap scripts target POSIX sh; all others are bash
        if echo "$f" | grep -q "tools/autosnap"; then
          sh -n "$f" || { echo "FAIL syntax: $f"; failed=1; }
          shellcheck --shell=sh --severity=warning \
            --exclude=SC1091,SC2034 "$f" \
            || { echo "FAIL shellcheck: $f"; failed=1; }
        else
          bash -n "$f" || { echo "FAIL syntax: $f"; failed=1; }
          shellcheck --severity=error "$f" \
            || { echo "FAIL shellcheck: $f"; failed=1; }
        fi
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

autosnap-python-lint:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --quiet pyflakes
  script:
    - |
      echo "==> pyflakes (hooks/dnf excluded: requires dnf runtime)"
      python3 -m pyflakes \
        tools/autosnap/autosnap.py \
        tools/autosnap/hooks/zypper/autosnap.py
    - |
      echo "==> py_compile syntax check"
      python3 -m py_compile tools/autosnap/autosnap.py \
        && echo "OK: autosnap.py"
      python3 -m py_compile tools/autosnap/hooks/dnf/autosnap.py \
        && echo "OK: hooks/dnf/autosnap.py"
      python3 -m py_compile tools/autosnap/hooks/zypper/autosnap.py \
        && echo "OK: hooks/zypper/autosnap.py"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

autosnap-makefile-check:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y make
  script:
    - make --dry-run install-autosnap DESTDIR=/tmp/bdfs-test
    - make --dry-run uninstall-autosnap DESTDIR=/tmp/bdfs-test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

integration-test:
  stage: integration
  # Privileged mode is required for loopback device creation (losetup) and
  # BTRFS/FUSE mounts. The runner must have privileged: true in its config.
  # allow_failure: true so the MR is not blocked when no privileged runner
  # is available — the job will still appear as a warning in the pipeline.
  allow_failure: true
  tags:
    - privileged
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        btrfs-progs
        fuse3
        fuse-overlayfs
        curl
        xz-utils
        sqlite3
    # Install DwarFS universal binary (mkdwarfs, dwarfs, dwarfsextract)
    - |
      DWARFS_VERSION=0.10.2
      curl -fsSL \
        "https://github.com/mhx/dwarfs/releases/download/v${DWARFS_VERSION}/dwarfs-universal-${DWARFS_VERSION}-Linux-x86_64.tar.xz" \
        -o /tmp/dwarfs.tar.xz
      tar -xf /tmp/dwarfs.tar.xz -C /tmp
      install -m 0755 /tmp/dwarfs-universal-*/dwarfs-universal /usr/local/bin/dwarfs-universal
      ln -sf dwarfs-universal /usr/local/bin/mkdwarfs
      ln -sf dwarfs-universal /usr/local/bin/dwarfs
      ln -sf dwarfs-universal /usr/local/bin/dwarfsextract
      ln -sf dwarfs-universal /usr/local/bin/dwarfsck
      rm -rf /tmp/dwarfs.tar.xz /tmp/dwarfs-universal-*
    # Install Kubo (IPFS) for the IPFS pinning integration test
    - |
      KUBO_VERSION=0.29.0
      curl -fsSL \
        "https://dist.ipfs.tech/kubo/v${KUBO_VERSION}/kubo_v${KUBO_VERSION}_linux-amd64.tar.gz" \
        -o /tmp/kubo.tar.gz
      tar -xf /tmp/kubo.tar.gz -C /tmp
      install -m 0755 /tmp/kubo/ipfs /usr/local/bin/ipfs
      rm -rf /tmp/kubo.tar.gz /tmp/kubo
  script:
    - bash tests/integration/run_all.sh
  artifacts:
    when: always
    paths:
      - tests/integration/results/
    reports:
      junit: tests/integration/results/junit.xml
    expire_in: 14 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

build:
  stage: build
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        build-essential make gcc libssl-dev libelf-dev bc bison flex
  script:
    - make || true
  artifacts:
    paths: [build/]
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'
