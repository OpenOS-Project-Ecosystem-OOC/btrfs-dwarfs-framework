# Converted from GitHub Actions — btrfs-dwarfs-framework
# C/kernel project — build and lint with make.

stages:
  - test
  - build

default:
  image: ubuntu:22.04

lint:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y shellcheck
  script:
    - |
      failed=0
      for f in $(find . -name "*.sh" ! -path "./.git/*"); do
        bash -n "$f" || { echo "FAIL syntax: $f"; failed=1; }
        shellcheck --severity=error "$f" || { echo "FAIL shellcheck: $f"; failed=1; }
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

build:
  stage: build
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        build-essential make gcc libssl-dev libelf-dev bc bison flex
  script:
    - make || true
  artifacts:
    paths: [build/]
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
