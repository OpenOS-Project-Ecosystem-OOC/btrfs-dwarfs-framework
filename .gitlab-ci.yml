# Converted from GitHub Actions — btrfs-dwarfs-framework
# Mirrors: ci.yml, labeler.yml

stages:
  - test

default:
  image: golang:1.22

.go-cache: &go-cache
  cache:
    key:
      files: [go.sum]
    paths: [.go-cache/]
  variables:
    GOPATH: "$CI_PROJECT_DIR/.go-cache"

# ── Build & test ──────────────────────────────────────────────────────────────
test:
  stage: test
  <<: *go-cache
  script:
    - go build ./...
    - go vet ./...
    - go test ./... -v -count=1
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

# ── Lint ──────────────────────────────────────────────────────────────────────
lint:
  stage: test
  image: golangci/golangci-lint:latest
  <<: *go-cache
  script:
    - golangci-lint run ./...
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
