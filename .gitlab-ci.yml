# Converted from GitHub Actions — btrfs-dwarfs-framework
# C/kernel project — build and lint with make.

stages:
  - secret-scan
  - test
  - build
  - integration-test

default:
  image: ubuntu:22.04

lint:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y shellcheck
  script:
    - |
      failed=0
      for f in $(find . -name "*.sh" ! -path "./.git/*"); do
        # autosnap scripts target POSIX sh; all others are bash
        if echo "$f" | grep -q "tools/autosnap"; then
          sh -n "$f" || { echo "FAIL syntax: $f"; failed=1; }
          shellcheck --shell=sh --severity=warning \
            --exclude=SC1091,SC2034 "$f" \
            || { echo "FAIL shellcheck: $f"; failed=1; }
        else
          bash -n "$f" || { echo "FAIL syntax: $f"; failed=1; }
          shellcheck --severity=error "$f" \
            || { echo "FAIL shellcheck: $f"; failed=1; }
        fi
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

autosnap-python-lint:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --quiet pyflakes
  script:
    - |
      echo "==> pyflakes (hooks/dnf excluded: requires dnf runtime)"
      python3 -m pyflakes \
        tools/autosnap/autosnap.py \
        tools/autosnap/hooks/zypper/autosnap.py
    - |
      echo "==> py_compile syntax check"
      python3 -m py_compile tools/autosnap/autosnap.py \
        && echo "OK: autosnap.py"
      python3 -m py_compile tools/autosnap/hooks/dnf/autosnap.py \
        && echo "OK: hooks/dnf/autosnap.py"
      python3 -m py_compile tools/autosnap/hooks/zypper/autosnap.py \
        && echo "OK: hooks/zypper/autosnap.py"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

autosnap-makefile-check:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y make
  script:
    - make --dry-run install-autosnap DESTDIR=/tmp/bdfs-test
    - make --dry-run uninstall-autosnap DESTDIR=/tmp/bdfs-test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

build:
  stage: build
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        build-essential make gcc libssl-dev libelf-dev bc bison flex
  script:
    - make || true
  artifacts:
    paths: [build/]
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'

# ── Runner registration ───────────────────────────────────────────────────────
#
# One-time manual job. Run this after obtaining a runner token from:
#   GitLab → Project → Settings → CI/CD → Runners → New project runner
#   (set tags: privileged, self-hosted; uncheck "Run untagged jobs")
#
# Store the token as a masked CI/CD variable: BDFS_RUNNER_TOKEN
# Store the Incus host SSH target as: BDFS_RUNNER_HOST (user@host)
#
# The job SSHes to the runner host, installs the executor scripts from
# gitlab-enhanced, and calls gitlab-runner register.

register-runner:
  stage: build
  image: ubuntu:22.04
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends openssh-client git
    - eval "$(ssh-agent -s)"
    - echo "$BDFS_RUNNER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$(echo $BDFS_RUNNER_HOST | cut -d@ -f2)" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - |
      # Verify required variables are set
      if [ -z "${BDFS_RUNNER_TOKEN:-}" ]; then
        echo "ERROR: BDFS_RUNNER_TOKEN is not set."
        echo "Obtain a token from: GitLab → Settings → CI/CD → Runners → New project runner"
        echo "Store it as a masked CI/CD variable named BDFS_RUNNER_TOKEN."
        exit 1
      fi
      if [ -z "${BDFS_RUNNER_HOST:-}" ]; then
        echo "ERROR: BDFS_RUNNER_HOST is not set (expected: user@hostname)."
        exit 1
      fi
      if [ -z "${BDFS_RUNNER_SSH_KEY:-}" ]; then
        echo "ERROR: BDFS_RUNNER_SSH_KEY is not set (expected: private key PEM)."
        exit 1
      fi

      # Clone gitlab-enhanced to get the Incus executor scripts
      git clone --depth=1 \
        "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/openos-project/git-management_deving/gitlab-enhanced.git" \
        /tmp/gitlab-enhanced

      # Copy executor scripts to the runner host and register
      ssh "${BDFS_RUNNER_HOST}" "mkdir -p /tmp/incus-runner-install"
      scp /tmp/gitlab-enhanced/runtime/incus/runner/{config.sh,prepare.sh,run.sh,cleanup.sh,install.sh} \
        "${BDFS_RUNNER_HOST}:/tmp/incus-runner-install/"

      ssh "${BDFS_RUNNER_HOST}" bash <<REMOTE
        set -euo pipefail

        # Install executor scripts
        sudo bash /tmp/incus-runner-install/install.sh

        # Register the runner (idempotent: unregister first if already registered)
        if sudo gitlab-runner list 2>&1 | grep -q "bdfs-integration-privileged"; then
          echo "Runner already registered — unregistering first"
          sudo gitlab-runner unregister --name bdfs-integration-privileged || true
        fi

        sudo gitlab-runner register \
          --non-interactive \
          --url "https://gitlab.com" \
          --token "${BDFS_RUNNER_TOKEN}" \
          --executor custom \
          --builds-dir /builds \
          --cache-dir /cache \
          --custom-config-exec  /usr/local/lib/gitlab-runner-incus/config.sh \
          --custom-prepare-exec /usr/local/lib/gitlab-runner-incus/prepare.sh \
          --custom-run-exec     /usr/local/lib/gitlab-runner-incus/run.sh \
          --custom-cleanup-exec /usr/local/lib/gitlab-runner-incus/cleanup.sh \
          --tag-list "privileged,self-hosted,incus" \
          --run-untagged false \
          --locked false \
          --description "bdfs-integration-privileged"

        sudo gitlab-runner restart
        echo "Runner registered and restarted."
        sudo gitlab-runner list
      REMOTE

# ── Integration tests ─────────────────────────────────────────────────────────
#
# These jobs require a privileged self-hosted Incus runner with:
#   - losetup / BTRFS mounts (security.privileged = true on the container)
#   - FUSE (fuse device pass-through via the gitlab-runner Incus profile)
#   - ipfs (Kubo daemon, for IPFS pinning tests)
#
# Register the runner with: make register-runner (see above).
# Until a runner is available, allow_failure: true keeps the pipeline green.

.integration-base:
  stage: integration-test
  tags:
    - privileged
    - self-hosted
    - incus
  allow_failure: true
  variables:
    INCUS_IMAGE: "gitlab-enhanced/ci-base:latest"
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends
        btrfs-progs fuse3 fuse-overlayfs util-linux ipfs
        build-essential cmake git ca-certificates curl
    - modprobe btrfs 2>/dev/null || true
    - modprobe fuse 2>/dev/null || true

integration:workspace-health-check:
  extends: .integration-base
  script:
    - bash tests/integration/test_workspace_health_check.sh
  artifacts:
    when: always
    paths: [tests/integration/logs/]
    expire_in: 3 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

integration:ipfs-pin:
  extends: .integration-base
  script:
    - bash tests/integration/test_ipfs_pin.sh
  artifacts:
    when: always
    paths: [tests/integration/logs/]
    expire_in: 3 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
