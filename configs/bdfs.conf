# /etc/bdfs/bdfs.conf
#
# Configuration file for the BTRFS+DwarFS framework daemon and CLI tools.
#
# Format: INI-style. Sections are [bracketed]. Keys are lowercase with
# underscores. Values are unquoted strings. Lines beginning with # are
# comments. Unknown keys and sections are silently ignored so older config
# files remain valid after upgrades.
#
# All values shown are defaults. Uncomment and modify as needed.
# After editing, restart the daemon: systemctl restart bdfs_daemon

# ── [daemon] ──────────────────────────────────────────────────────────────────

[daemon]

# Path to the bdfs kernel module control device.
# The daemon opens this device to issue ioctls to the kernel module.
#ctl_device = /dev/bdfs_ctl

# Unix domain socket path for CLI <-> daemon communication.
# Must be writable by the user running bdfs CLI commands.
#socket_path = /run/bdfs/daemon.sock

# Directory for persistent daemon state: job queue, image metadata,
# private FUSE mountpoints, and the DwarFS image index.
#state_dir = /var/lib/bdfs

# Number of worker threads for the job queue.
# 0 = auto-detect: uses min(nproc, 8).
#worker_threads = 0

# Maximum seconds allowed for a mkdwarfs child process before SIGTERM
# (then SIGKILL after 5 s). Applies to workspace DELETE shutdown jobs
# and manual bdfs demote operations.
# Default: 2700 (45 min) — sufficient for a 50 GB workspace on NVMe.
#mkdwarfs_timeout = 2700

# Path to the append-only JSONL workspace shutdown event log.
# Each line records: workspace path, reason (pause/delete/stop), outcome,
# duration, archive path, and IPFS CID.
# Used by: bdfs shutdown-log show, workspace-health-check
#shutdown_log = /var/log/bdfs/workspace-shutdown.jsonl

# Kubo HTTP RPC API base URL used by bdfs-pin-helper when pinning DwarFS
# archives to IPFS after a workspace DELETE shutdown.
# Set to empty string to disable IPFS pinning.
# Requires bdfs-pin-helper to be installed (make install-pin-helper).
#kubo_api = http://127.0.0.1:5001

# ── [tools] ───────────────────────────────────────────────────────────────────
#
# Paths to external tool binaries. If unset, the daemon searches $PATH.

[tools]

# mkdwarfs: creates DwarFS compressed filesystem images.
# Required for: bdfs demote, workspace DELETE shutdown jobs.
# Install: https://github.com/mhx/dwarfs/releases
#mkdwarfs = /usr/bin/mkdwarfs

# dwarfs: FUSE driver for mounting DwarFS images read-only.
# Required for: bdfs mount, blend layer operations.
#dwarfs = /usr/bin/dwarfs

# dwarfsextract: extracts DwarFS image contents to a directory.
# Required for: bdfs promote, bdfs fetch --cid.
#dwarfsextract = /usr/bin/dwarfsextract

# dwarfsck: verifies DwarFS image integrity (checksum + metadata).
# Required for: bdfs verify.
#dwarfsck = /usr/bin/dwarfsck

# btrfs: BTRFS userspace tools (btrfs-progs).
# Required for: snapshot, subvolume, send/receive operations.
#btrfs = /usr/bin/btrfs

# fuse-overlayfs: userspace overlay filesystem driver.
# Required for: blend layer mounts when bdfs_blend kernel module is absent.
# Install: apt install fuse-overlayfs  |  dnf install fuse-overlayfs
#fuse_overlayfs = /usr/bin/fuse-overlayfs

# bdfs-pin-helper: Go binary (from gitlab-enhanced) that pins DwarFS archives
# to IPFS via the Kubo HTTP API. Called as a subprocess by bdfs_daemon after
# a successful workspace demote. If unset, searches $PATH.
# Install: make install-pin-helper  (builds from integrations/gitlab-enhanced)
#pin_helper = /usr/local/bin/bdfs-pin-helper

# ── [defaults] ────────────────────────────────────────────────────────────────
#
# Default parameters for DwarFS operations. All can be overridden per-command
# with CLI flags.

[defaults]

# Default DwarFS compression algorithm for new exports.
# Options: zstd (default), lzma, lz4, brotli, none
#   zstd   — best balance of speed and ratio
#   lzma   — highest ratio, slowest (good for archival)
#   lz4    — fastest, lower ratio (good for frequently-accessed images)
#   brotli — good ratio, moderate speed
#   none   — no compression (debugging or pre-compressed content)
#compression = zstd

# DwarFS block size as log2(bytes). 22 = 4 MiB blocks (default).
# Larger blocks improve compression ratio but increase mount memory usage.
# Valid range: 12–28.
#block_size_bits = 22

# DwarFS FUSE mount block cache size in MiB.
# 0 = use dwarfs built-in default (256 MiB).
#cache_size_mb = 256

# ── [blend] ───────────────────────────────────────────────────────────────────
#
# Settings for the bdfs blend layer — a union mount presenting a DwarFS
# read-only lower layer and a BTRFS read-write upper layer as one filesystem.

[blend]

# Allow writes to propagate to the BTRFS upper layer.
# Set false for read-only blend mounts (e.g. shared library images).
#writeback = true

# Defer DwarFS image mounting until first file access inside the blend.
# Reduces startup latency for large images.
#lazy_load = true

# Fall back to fuse-overlayfs when the bdfs_blend kernel module is absent.
# Set false to treat a missing kernel module as a hard error.
#userspace_fallback = true

# ── [autosnap] ────────────────────────────────────────────────────────────────
#
# Configuration for the autosnap package-manager hook.
# autosnap takes a BTRFS snapshot before each package operation (apt, dnf,
# pacman) so the system can be rolled back if an upgrade breaks something.
# Full autosnap config is in /etc/autosnap.conf; these keys control the
# bdfs-specific behaviour.

[autosnap]

# Maximum autosnap snapshots to retain per partition.
# 0 = unlimited (manage manually with: bdfs snapshot prune).
#max_snapshots = 5

# UUID of the bdfs partition to snapshot on each package operation.
# Leave empty to use the first partition from: bdfs partition list
#partition_uuid =

# Archive pruned autosnap snapshots as DwarFS images before deletion.
# Equivalent to: bdfs snapshot prune --demote-first
# Requires bdfs_daemon running and mkdwarfs installed.
#demote_on_prune = false

# Compression algorithm for autosnap demote-on-prune archives.
# Same options as [defaults] compression.
#demote_compression = zstd
