# /etc/bdfs/bdfs.conf - BTRFS+DwarFS framework configuration
#
# All values shown are defaults. Uncomment and modify as needed.

[daemon]
# Control device path
#ctl_device = /dev/bdfs_ctl

# Maximum time (seconds) allowed for a mkdwarfs compression operation before
# the child process is killed with SIGTERM then SIGKILL.
# 0 = use the compiled-in default (2700 s = 45 min).
# Increase for very large workspaces on slow disks.
#mkdwarfs_timeout = 2700

# Path to the append-only JSONL file where workspace shutdown events are
# recorded (one JSON object per line). Rotatable with logrotate copytruncate.
# Default: /var/log/bdfs/workspace-shutdown.jsonl
#shutdown_log = /var/log/bdfs/workspace-shutdown.jsonl

# Unix socket for CLI communication
#socket_path = /run/bdfs/daemon.sock

# State directory (stores job state, image metadata, private FUSE mountpoints)
#state_dir = /var/lib/bdfs

# Worker thread count (0 = auto-detect from CPU count)
#worker_threads = 0

[tools]
# Paths to required external tools.
# If not set, the daemon searches $PATH.
#mkdwarfs      = /usr/bin/mkdwarfs
#dwarfs        = /usr/bin/dwarfs
#dwarfsextract = /usr/bin/dwarfsextract
#dwarfsck      = /usr/bin/dwarfsck
#btrfs         = /usr/bin/btrfs

# fuse-overlayfs binary used for the userspace blend fallback.
# Required when the bdfs_blend kernel module is not loaded.
# Install from your distribution: fuse-overlayfs (Fedora/Debian/Ubuntu/Arch)
# or build from https://github.com/containers/fuse-overlayfs
#fuse_overlayfs = /usr/bin/fuse-overlayfs

[defaults]
# Default DwarFS compression algorithm for new exports
# Options: zstd (default), lzma, lz4, brotli, none
#compression = zstd

# Default DwarFS block size (log2). 22 = 4 MiB blocks.
# Larger blocks improve compression but increase memory use.
#block_size_bits = 22

# Default DwarFS FUSE mount cache size in MiB
#cache_size_mb = 256

[blend]
# Default mount flags for blend layer mounts.

# writeback: allow writes to propagate to BTRFS upper layer
#writeback = true

# lazy_load: defer DwarFS image mounts until first access
#lazy_load = true

# userspace_fallback: automatically fall back to fuse-overlayfs when the
# bdfs_blend kernel module is not available (ENODEV).
# Set to false to treat a missing kernel module as a hard error.
#userspace_fallback = true

[autosnap]
# Configuration for the autosnap package-manager hook.
# Full config is in /etc/autosnap.conf; these are the bdfs-specific defaults.

# Maximum number of autosnap snapshots to retain.
# Enforced via `bdfs snapshot prune --pattern "autosnap-*" --keep <n>`.
# 0 = unlimited (manage retention manually via `bdfs snapshot prune`).
#max_snapshots = 5

# UUID of the bdfs partition to snapshot on each package operation.
# Leave empty to use the first partition returned by `bdfs partition list`.
#partition_uuid =

# When pruning old autosnap snapshots, archive them as DwarFS images before
# deletion. Equivalent to `bdfs snapshot prune --demote-first`.
# Requires bdfs_daemon to be running.
#demote_on_prune = false

# Compression algorithm used when demoting pruned autosnap snapshots.
# Options: zstd (default), lzma, lz4, brotli, none
#demote_compression = zstd
