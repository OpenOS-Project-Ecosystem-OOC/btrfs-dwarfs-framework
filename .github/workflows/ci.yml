name: CI

on:
  push:
    branches: ["master", "main", "feat/**", "fix/**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  # ── Userspace build + unit tests ──────────────────────────────────────────
  build-userspace:
    name: Userspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc clang \
            libc6-dev

      - name: Configure (Release)
        run: |
          cmake -S userspace -B build/release \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DAEMON=ON \
            -DBUILD_CLI=ON \
            -DBUILD_TESTS=OFF

      - name: Build (Release)
        run: cmake --build build/release --parallel

      - name: Verify binaries exist
        run: |
          test -f build/release/bdfs_daemon
          test -f build/release/bdfs
          echo "bdfs --version:"
          ./build/release/bdfs --version || true

      - name: Configure (Debug + ASan)
        run: |
          cmake -S userspace -B build/asan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_DAEMON=ON \
            -DBUILD_CLI=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_ASAN=ON

      - name: Build (Debug + ASan)
        run: cmake --build build/asan --parallel

      - name: Run unit tests
        run: |
          cd build/asan
          ctest --output-on-failure --timeout 30

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-24.04'
        with:
          name: bdfs-binaries-${{ matrix.os }}
          path: |
            build/release/bdfs
            build/release/bdfs_daemon
          retention-days: 7

  # ── Clang build (cross-compiler check) ────────────────────────────────────
  build-clang:
    name: Userspace (clang)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang

      - name: Configure
        run: |
          cmake -S userspace -B build/clang \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DBUILD_DAEMON=ON \
            -DBUILD_CLI=ON

      - name: Build
        run: cmake --build build/clang --parallel

  # ── Kernel module compile check ────────────────────────────────────────────
  build-kernel-module:
    name: Kernel module (compile check)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install kernel headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            linux-headers-$(uname -r) \
            build-essential kmod

      - name: Build kernel module
        run: |
          make kernel KDIR=/lib/modules/$(uname -r)/build
        continue-on-error: true
        # The module may fail to compile if the running kernel is too new
        # or missing BTRFS/FUSE config.  We treat this as a warning, not
        # a hard failure, since CI runners don't guarantee a BTRFS-enabled
        # kernel config.  The compile check still catches syntax errors.

      - name: Report module build result
        run: |
          if [ -f kernel/btrfs_dwarfs/btrfs_dwarfs.ko ]; then
            echo "✅ Kernel module compiled successfully"
            modinfo kernel/btrfs_dwarfs/btrfs_dwarfs.ko
          else
            echo "⚠️  Kernel module did not produce .ko (may need BTRFS/FUSE kernel config)"
          fi

  # ── Static analysis ────────────────────────────────────────────────────────
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang clang-tools cppcheck

      - name: cppcheck (userspace)
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=0 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -I include \
            -I include/uapi \
            userspace/daemon/ userspace/cli/ \
            2>&1 | tee cppcheck.txt
          # Fail if cppcheck found errors (not warnings)
          ! grep -q "^.*error:" cppcheck.txt

      - name: scan-build (clang static analyser)
        run: |
          cmake -S userspace -B build/scan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DBUILD_DAEMON=ON \
            -DBUILD_CLI=ON
          scan-build --status-bugs cmake --build build/scan --parallel \
            || echo "scan-build found potential issues (non-fatal)"

  # ── Integration tests (requires root + btrfs-progs + dwarfs) ──────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-24.04
    # Only run on push to master/main to avoid burning minutes on every PR
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            btrfs-progs fuse3 libfuse3-dev \
            python3 util-linux

      - name: Install DwarFS tools
        run: |
          # Download pre-built DwarFS static binaries
          DWARFS_VER="0.9.10"
          ARCH=$(uname -m)
          URL="https://github.com/mhx/dwarfs/releases/download/v${DWARFS_VER}/dwarfs-universal-${DWARFS_VER}-Linux-${ARCH}.tar.zst"
          if curl -fsSL "$URL" -o dwarfs.tar.zst 2>/dev/null; then
            tar --zstd -xf dwarfs.tar.zst
            sudo install -m755 dwarfs-universal-*/sbin/mkdwarfs     /usr/local/bin/mkdwarfs
            sudo install -m755 dwarfs-universal-*/sbin/dwarfs       /usr/local/bin/dwarfs
            sudo install -m755 dwarfs-universal-*/sbin/dwarfsextract /usr/local/bin/dwarfsextract
            sudo install -m755 dwarfs-universal-*/sbin/dwarfsck     /usr/local/bin/dwarfsck
            echo "DwarFS tools installed"
          else
            echo "DwarFS release not available for this arch/version — skipping integration tests"
            exit 0
          fi

      - name: Install kernel headers and build tools
        run: |
          sudo apt-get install -y --no-install-recommends \
            linux-headers-$(uname -r) build-essential kmod cmake ninja-build

      - name: Build userspace CLI (needed by kernel module test)
        run: |
          cmake -S userspace -B build/userspace \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DAEMON=ON \
            -DBUILD_CLI=ON
          cmake --build build/userspace --parallel

      - name: Build kernel module
        run: |
          make kernel KDIR=/lib/modules/$(uname -r)/build || true
          if [[ -f kernel/btrfs_dwarfs/btrfs_dwarfs.ko ]]; then
            echo "KO_BUILT=true" >> "$GITHUB_ENV"
          else
            echo "KO_BUILT=false" >> "$GITHUB_ENV"
            echo "⚠️  Kernel module not built — kernel ioctl tests will be skipped"
          fi

      - name: Load required kernel modules
        run: |
          sudo modprobe btrfs   || true
          sudo modprobe overlay || true
          sudo modprobe fuse    || true

      - name: Run integration tests
        run: sudo bash tests/integration/run_all.sh
        timeout-minutes: 15

  # ── Formatting check ───────────────────────────────────────────────────────
  format-check:
    name: Format check
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y --no-install-recommends clang-format

      - name: Check formatting
        run: |
          find kernel userspace include -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror \
              --style="{BasedOnStyle: Linux, IndentWidth: 8}" \
            2>&1 | head -40 || \
            echo "Format issues found — run 'make fmt' to fix"
          # Non-fatal: formatting is enforced by convention, not hard gate
          exit 0
