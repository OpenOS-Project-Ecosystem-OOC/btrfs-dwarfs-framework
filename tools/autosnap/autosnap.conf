# /etc/autosnap.conf
# autosnap configuration — btrfs-dwarfs-framework edition
#
# Backend is auto-detected: bdfs daemon (primary) → raw btrfs (fallback).
# Override with BACKEND=btrfs to force the fallback regardless of daemon state.

# ---------------------------------------------------------------------------
# Backend
# ---------------------------------------------------------------------------

# Force a specific backend. Leave empty for auto-detection (recommended).
# Valid values: bdfs | btrfs
#BACKEND=

# ---------------------------------------------------------------------------
# Snapshot retention
# ---------------------------------------------------------------------------

# Maximum autosnap snapshots to keep. Enforced via `bdfs snapshot prune`
# (bdfs backend) or direct subvolume deletion (btrfs fallback).
# 0 = unlimited.
MAX_SNAPSHOTS=5

# ---------------------------------------------------------------------------
# bdfs backend options
# ---------------------------------------------------------------------------

# Path to the bdfs CLI binary.
BDFS_BIN=bdfs

# Path to the bdfs daemon Unix socket.
BDFS_SOCKET=/run/bdfs/bdfs.sock

# UUID of the bdfs partition to snapshot. Leave empty for auto-detection
# (first partition returned by `bdfs partition list`).
#BDFS_PARTITION_UUID=

# When pruning old autosnap snapshots, demote them to DwarFS archives before
# deletion (requires bdfs daemon). Equivalent to `bdfs snapshot prune --demote-first`.
BDFS_DEMOTE_ON_PRUNE=false

# Compression algorithm used when demoting pruned snapshots.
# Valid values: zstd | lzma | lz4 | brotli | none
BDFS_DEMOTE_COMPRESSION=zstd

# ---------------------------------------------------------------------------
# Package metadata
# ---------------------------------------------------------------------------

# Embed the package list in snapshot metadata (sidecar file for bdfs backend,
# btrfs subvolume property for btrfs fallback).
RECORD_PACKAGES=true

# ---------------------------------------------------------------------------
# Skip control
# ---------------------------------------------------------------------------

# Set this environment variable to skip snapshotting for one run.
# Example: SKIP_AUTOSNAP= apt upgrade
SKIP_ENV_VAR=SKIP_AUTOSNAP

# ---------------------------------------------------------------------------
# Snapshot description template
# ---------------------------------------------------------------------------

# Placeholders: {action} = package manager name, {date} = timestamp
DESCRIPTION_TEMPLATE=autosnap: pre {action} on {date}
